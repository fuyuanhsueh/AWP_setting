<!DOCTYPE html>
<html lang="zh-TW">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>載入失敗</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
 background: #0f172a;
 color: #f8fafc;
 height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 -webkit-app-region: drag;
 user-select: none;
 }

 .container {
 text-align: center;
 max-width: 420px;
 padding: 0 24px;
 -webkit-app-region: no-drag;
 }

 .icon {
 width: 64px;
 height: 64px;
 margin: 0 auto 24px;
 border-radius: 50%;
 background: #1e293b;
 border: 1px solid #334155;
 display: flex;
 align-items: center;
 justify-content: center;
 }

 .icon svg {
 width: 32px;
 height: 32px;
 stroke: #94a3b8;
 fill: none;
 stroke-width: 2;
 stroke-linecap: round;
 stroke-linejoin: round;
 }

 h1 {
 font-size: 20px;
 font-weight: 600;
 color: #f8fafc;
 margin-bottom: 8px;
 }

 p {
 font-size: 14px;
 line-height: 1.6;
 color: #94a3b8;
 margin-bottom: 32px;
 }

 button {
 display: inline-flex;
 align-items: center;
 gap: 8px;
 padding: 10px 24px;
 font-size: 14px;
 font-weight: 500;
 color: #0f172a;
 background: #10b981;
 border: none;
 border-radius: 8px;
 cursor: pointer;
 transition: background 0.15s;
 }

 button:hover { background: #34d399; }
 button:active { background: #059669; }

 button svg {
 width: 16px;
 height: 16px;
 stroke: currentColor;
 fill: none;
 stroke-width: 2;
 stroke-linecap: round;
 stroke-linejoin: round;
 }
 </style>
</head>
<body>
 <div class="container">
 <div class="icon">
 <svg viewBox="0 0 24 24">
 <circle cx="12" cy="12" r="10"/>
 <line x1="12" y1="8" x2="12" y2="12"/>
 <line x1="12" y1="16" x2="12.01" y2="16"/>
 </svg>
 </div>
 <h1>頁面載入失敗</h1>
 <p>應用程式無法載入主畫面，請嘗試重新載入。<br>如持續發生，請聯繫開發團隊。</p>
 <button onclick="location.reload()">
 <svg viewBox="0 0 24 24">
 <polyline points="23 4 23 10 17 10"/>
 <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
 </svg>
 重新載入
 </button>
 </div>
</body>
</html>
